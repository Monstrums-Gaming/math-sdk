<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <filter id="ttGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- plate: themed panel ground -->
  <rect class="tt-plate" width="1200" height="700" rx="38"/>

  <text class="tt-tap" x="120" y="340"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="230" font-weight="900" font-style="italic"
        letter-spacing="-18">TAP</text>

  <text class="tt-trade" x="130" y="555"
        font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="210" font-weight="900" font-style="italic"
        letter-spacing="-12">TRADE</text>

  <!-- tap target -->
  <g transform="translate(645 260)">
    <circle class="tt-ring" r="52" fill="none" stroke-width="14" opacity="0.45" filter="url(#ttGlow)"/>
    <circle class="tt-ring-inner" r="29" stroke-width="10"/>
    <circle class="tt-dot" r="10"/>
  </g>

  <!-- hand cursor -->
  <g class="tt-hand" transform="translate(650 280)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round">
    <path d="M0 40
             L0 -8
             C0 -30 34 -30 34 -8
             L34 34
             L48 16
             C58 4 78 10 76 26
             L74 42
             L86 27
             C96 15 116 22 112 38
             L108 52
             L120 42
             C132 32 150 44 143 58
             L112 123
             C103 141 86 151 65 151
             L44 151
             C24 151 8 143 -5 128
             L-42 82
             C-56 66 -34 45 -17 58
             Z"/>
  </g>

  <!-- rising market line -->
  <polyline class="tt-line" points="760,285 860,205 940,238 1065,110"
            fill="none" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon class="tt-arrow" points="1047,104 1084,90 1072,127"/>

  <!-- candlesticks -->
  <g class="tt-candles" stroke-width="9" stroke-linecap="round">
    <line x1="800" y1="360" x2="800" y2="465"/>
    <rect x="782" y="385" width="36" height="55" rx="5"/>

    <line x1="875" y1="320" x2="875" y2="445"/>
    <rect x="855" y="340" width="40" height="72" rx="5"/>

    <line x1="950" y1="330" x2="950" y2="465"/>
    <rect x="930" y="350" width="40" height="78" rx="5"/>

    <line x1="1030" y1="250" x2="1030" y2="390"/>
    <rect x="1007" y="280" width="46" height="82" rx="5"/>
  </g>
</svg>
