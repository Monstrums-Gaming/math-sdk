name: deploy-build-service

# Builds the mystery-box build service image (amd64), pushes to ECR, and deploys it on the
# EC2 box via SSM. See service/CICD.md for the one-time AWS setup (OIDC provider, gha-deploy
# role, instance role). Set the repo variable EC2_INSTANCE_ID (Settings → Secrets and
# variables → Actions → Variables) to the target instance id.

on:
  push:
    branches: [staging]
    paths:
      - 'service/**'
      - 'games/mystery_box_dynamic/**'
      - 'src/**'
      - 'requirements.txt'
      - 'setup.py'
      - '.github/workflows/deploy-service.yml'
  workflow_dispatch: {}

permissions:
  id-token: write        # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "493499579237"
  ECR_REPO: mysterybox-build-service-staging
  ENV_FILE: /home/ubuntu/math-sdk/.env     # .env location on the EC2 box

jobs:
  deploy:
    runs-on: ubuntu-latest                 # amd64 runner -> amd64 image
    steps:
      - uses: actions/checkout@v4

      - name: Assume AWS role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::493499579237:role/gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # The target EC2 box is a Graviton (t4g) instance = arm64, so build arm64.
      # GitHub runners are amd64, so cross-build via QEMU + buildx.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image (arm64 — Graviton t4g)
        run: |
          IMG="${{ steps.ecr.outputs.registry }}/${ECR_REPO}:${GITHUB_SHA::12}"
          LATEST="${{ steps.ecr.outputs.registry }}/${ECR_REPO}:latest"
          docker buildx build --platform linux/arm64 \
            -f service/Dockerfile -t "$IMG" -t "$LATEST" --push .
          echo "IMG=$IMG" >> "$GITHUB_ENV"

      - name: Deploy on EC2 via SSM
        if: ${{ vars.EC2_INSTANCE_ID != '' }}
        run: |
          REG="${{ steps.ecr.outputs.registry }}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellCommand \
            --comment "deploy $IMG" \
            --parameters commands="[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REG\",
              \"docker pull $IMG\",
              \"docker rm -f mbs || true\",
              \"docker run -d --name mbs --restart unless-stopped -p 127.0.0.1:8000:8000 --cpus 2 --memory 2g --env-file $ENV_FILE $IMG\",
              \"sleep 3 && curl -sf http://127.0.0.1:8000/healthz\"
            ]" \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query '{status:Status, out:StandardOutputContent, err:StandardErrorContent}' --output json
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "${{ vars.EC2_INSTANCE_ID }}" --query Status --output text)
          test "$STATUS" = "Success"
